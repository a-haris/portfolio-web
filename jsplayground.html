<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://fonts.cdnfonts.com/css/typographica" rel="stylesheet">
        <style>@import url('https://fonts.cdnfonts.com/css/typographica');</style>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <link href="styles.css" rel="stylesheet">
        <title>Home?</title>
    </head>
    <body>
        <div class="container-fluid py-5">
            <h1 id="title">JavaScript testing</h1>
        </div>

        <h1 id="title">Click on the buttons as they go yellow!</h1>

        <div class="container justify-content-center p-4" id="buttons">
        <p id="display"></p>

        <button type="button" class="btn btn-light" id="btn0" onclick="goGreen(event)">1</button>
        <button type="button" class="btn btn-light" id="btn1" onclick="goGreen(event)">2</button>
        <button type="button" class="btn btn-light" id="btn2" onclick="goGreen(event)">3</button>
        <br>
        <button type="button" class="btn btn-light" id="btn3" onclick="goGreen(event)">4</button>
        <button type="button" class="btn btn-light" id="btn4" onclick="goGreen(event)">5</button>
        <button type="button" class="btn btn-light" id="btn5" onclick="goGreen(event)">6</button>
        <br>
        <button type="button" class="btn btn-light" id="btn6" onclick="goGreen(event)">7</button>
        <button type="button" class="btn btn-light" id="btn7" onclick="goGreen(event)">8</button>
        <button type="button" class="btn btn-light" id="btn8" onclick="goGreen(event)">9</button>

        </div>

        <a class="btn btn-light" type="button" href="index.html" >Home</a>

        <script>
            const num = 9;
            var count = 0;
            function goYellow() {
                var ID = "btn" + Math.floor(Math.random() * num);
                var chosen = document.getElementById(ID);
                while (chosen.style.backgroundColor == 'green')
                {
                    chosen = document.getElementById("btn" + Math.floor(Math.random() * num));
                }
                chosen.style.backgroundColor = 'yellow';
            }

            function goGreen(event) {
                var target = event.currentTarget;
                var yellowClicked = false;
                if (target.style.backgroundColor == 'yellow')
                {
                    target.style.backgroundColor = 'green';
                    count++;
                    yellowClicked = true;
                }

                if (count == 9)
                {
                    document.getElementById('display').innerHTML = 'YAY!';
                }
                else
                {
                    if (yellowClicked = true)
                    {
                        goYellow();
                    }
                }
            }
            document.addEventListener('DOMContentLoaded', function() {
                goYellow();
            });
        </script>
    </body>
